
services:
  localdb:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: practice_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d practice_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_web
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      localdb:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      bash -c "
      echo 'Waiting for database...' &&
      while ! pg_isready -h localdb -p 5432 -U postgres -d practice_management; do
        sleep 2;
      done &&
      echo 'Database is ready!' &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ../tija_pms_frontend
      dockerfile: Dockerfile
    volumes:
      - ../tija_pms_frontend:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - web
volumes:
  postgres_data:
